<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Young-AI 파트너</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>회원가입</h2>
        <form id="signupForm">
            <input type="text" id="name" placeholder="이름" required>
            <input type="tel" id="phone" placeholder="전화번호" required>
            <input type="text" id="signupId" placeholder="ID" required>
            <input type="password" id="signupPassword" placeholder="비밀번호" required>
            <input type="password" id="confirmPassword" placeholder="비밀번호 확인" required>
            <button type="submit">회원가입</button>
        </form>
        <p id="signupMessage" class="error-message"></p>
        <p>이미 계정이 있으신가요? <a href="index.html">로그인</a></p>
    </div>
    <script src="js/auth.js?v=2"></script>
</body>
</html>
