<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설문조사 - Young-AI 파트너</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>맞춤형 추천을 위한 설문</h2>
        <form id="surveyForm">
            <div class="survey-question">
                <p>현재 <span id="userName"></span>님이 자주 사용하는 편의점은 어디인가요?</p>
                <label><input type="radio" name="store" value="GS25" required> GS25</label>
                <label><input type="radio" name="store" value="CU" required> CU</label>
            </div>
            <div class="survey-question">
                <p>현재 <span id="userName2"></span>님이 사용하시는 통신사는 어디신가요?</p>
                <label><input type="radio" name="carrier" value="kt" required> KT</label>
                <label><input type="radio" name="carrier" value="lgu+" required> LG U+</label>
                <label><input type="radio" name="carrier" value="skt" required> SKT</label>
            </div>
            <button type="submit">제출하고 시작하기</button>
        </form>
    </div>
    <script src="js/survey.js"></script>
</body>
</html>
