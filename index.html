<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young-AI 파트너</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* General Styles */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #d7e1ec, #f5f7fa);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        h1 {
            font-size: 2rem;
            color: #007bff;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        h2 {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 1rem;
        }

        /* Forms and Inputs */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="text"],
        input[type="password"] {
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #f9f9f9;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #007bff;
            background-color: #ffffff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }

        button {
            padding: 0.8rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            margin-top: 1.5rem;
        }

        .button-group p {
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #666;
        }

        .error-message {
            color: #d9534f;
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.2em;
        }

        a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Young리한 파트너</h1>
        <p>우리들 소비를 영(Young)리하게 돕는 AI</p>
        <div class="button-group">
            <button onclick="location.href='signup.html'" style="width: 100%;">시작하기 (회원가입)</button>
        </div>
    </div>
    <script src="js/auth.js?v=2"></script>
</body>
</html>
